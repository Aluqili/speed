workflows:
  client_ios_validate:
    name: SpeedStar Client iOS Validate
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: apps/client
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.speedstar.client
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Materialize local iOS secrets
        script: |
          set -e

          if [ -z "$CLIENT_IOS_MAPS_API_KEY" ]; then
            echo "CLIENT_IOS_MAPS_API_KEY is not set in Codemagic variables."
            exit 1
          fi

          if [ -z "$CLIENT_IOS_GOOGLE_SERVICE_INFO_PLIST_B64" ]; then
            echo "CLIENT_IOS_GOOGLE_SERVICE_INFO_PLIST_B64 is not set in Codemagic variables."
            exit 1
          fi

          cat > ios/Flutter/Secrets.xcconfig <<EOF
          // Generated by Codemagic at build time.
          MAPS_API_KEY=$CLIENT_IOS_MAPS_API_KEY
          EOF

          echo "$CLIENT_IOS_GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > ios/Runner/GoogleService-Info.plist
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build iOS without code signing
        script: flutter build ios --release --no-codesign
    artifacts:
      - apps/client/build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
      - apps/client/flutter_drive.log

  client_ios_release_ipa:
    name: SpeedStar Client iOS Signed IPA
    max_build_duration: 90
    instance_type: mac_mini_m2
    working_directory: apps/client
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.speedstar.client
      vars:
        BUNDLE_ID: com.speedstar.client
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Materialize local iOS secrets
        script: |
          set -e

          if [ -z "$CLIENT_IOS_MAPS_API_KEY" ]; then
            echo "CLIENT_IOS_MAPS_API_KEY is not set in Codemagic variables."
            exit 1
          fi

          if [ -z "$CLIENT_IOS_GOOGLE_SERVICE_INFO_PLIST_B64" ]; then
            echo "CLIENT_IOS_GOOGLE_SERVICE_INFO_PLIST_B64 is not set in Codemagic variables."
            exit 1
          fi

          cat > ios/Flutter/Secrets.xcconfig <<EOF
          // Generated by Codemagic at build time.
          MAPS_API_KEY=$CLIENT_IOS_MAPS_API_KEY
          EOF

          echo "$CLIENT_IOS_GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > ios/Runner/GoogleService-Info.plist
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build signed IPA
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - apps/client/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - apps/client/flutter_drive.log